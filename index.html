<header>
    <h1>CS 1.6 SKINS</h1>
    <div class="controls">
        <input type="text" id="searchInput" placeholder="Поиск..." onkeyup="search()">
        <div id="authSection" style="display: inline-block; margin-left: 10px;">
            <button class="theme-btn" id="loginBtn" onclick="toggleAuthModal()">Войти</button>
            <span id="userEmail" style="display:none; margin-right: 10px; font-weight: bold;"></span>
            <button class="theme-btn" id="logoutBtn" style="display:none; background:#ff4444;" onclick="handleLogout()">Выйти</button>
        </div>
    </div>
</header>

<div id="authModal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:var(--card-bg); padding:30px; border:2px solid var(--accent-color); border-radius:12px; z-index:1000; width: 300px;">
    <h3 id="modalTitle">Вход</h3>
    <input type="email" id="authEmail" placeholder="Email" style="width:90%; padding:10px; margin-bottom:10px; border-radius:5px;">
    <input type="password" id="authPass" placeholder="Пароль" style="width:90%; padding:10px; margin-bottom:10px; border-radius:5px;">
    <button class="btn btn-add" style="width:100%;" onclick="handleAuth()">Продолжить</button>
    <p style="font-size:0.8rem; text-align:center; cursor:pointer; margin-top:10px;" onclick="switchAuthMode()" id="toggleAuthMode">Нет аккаунта? Регистрация</p>
    <button onclick="toggleAuthModal()" style="position:absolute; top:5px; right:10px; background:none; border:none; color:white; cursor:pointer;">✕</button>
</div>

<script>
    // ТВОИ ДАННЫЕ (НЕ ЗАБУДЬ ЗАПОЛНИТЬ!)
    const SUPABASE_URL = 'https://kiybpoixffrtgaaifqii.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtpeWJwb2l4ZmZydGdhYWlmcWlpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNjM3MzQsImV4cCI6MjA4OTkzOTczNH0.ET48HkFxIYFKlSdehsTE9JS1BtgzYS9_USlyuXKmbZ4';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let isSignUp = false;

    // Проверка: залогинен ли пользователь?
    async function checkUser() {
        const { data: { user } } = await supabaseClient.auth.getUser();
        const adminPanelBtn = document.querySelector('.btn-toggle'); // Кнопка админки

        if (user) {
            document.getElementById('loginBtn').style.display = 'none';
            document.getElementById('userEmail').style.display = 'inline';
            document.getElementById('userEmail').innerText = user.email;
            document.getElementById('logoutBtn').style.display = 'inline';
            if(adminPanelBtn) adminPanelBtn.style.display = 'inline-block';
        } else {
            document.getElementById('loginBtn').style.display = 'inline';
            document.getElementById('userEmail').style.display = 'none';
            document.getElementById('logoutBtn').style.display = 'none';
            if(adminPanelBtn) adminPanelBtn.style.display = 'none'; // Скрываем админку от гостей
        }
    }

    // Вход / Регистрация
    async function handleAuth() {
        const email = document.getElementById('authEmail').value;
        const password = document.getElementById('authPass').value;

        if (isSignUp) {
            const { error } = await supabaseClient.auth.signUp({ email, password });
            if (error) alert("Ошибка регистрации: " + error.message);
            else alert("Регистрация успешна! Теперь войдите.");
        } else {
            const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) alert("Ошибка входа: " + error.message);
            else {
                toggleAuthModal();
                checkUser();
            }
        }
    }

    async function handleLogout() {
        await supabaseClient.auth.signOut();
        checkUser();
        location.reload(); // Перезагрузка для обновления прав
    }

    function toggleAuthModal() {
        const m = document.getElementById('authModal');
        m.style.display = m.style.display === 'none' ? 'block' : 'none';
    }

    function switchAuthMode() {
        isSignUp = !isSignUp;
        document.getElementById('modalTitle').innerText = isSignUp ? "Регистрация" : "Вход";
        document.getElementById('toggleAuthMode').innerText = isSignUp ? "Уже есть аккаунт? Войти" : "Нет аккаунта? Регистрация";
    }

    // Запуск проверки при загрузке
    checkUser();
    renderPacks(); 
</script>
